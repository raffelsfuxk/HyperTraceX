# HyperTraceX Docker Compose Configuration
# docker-compose up -d

version: '3.8'

services:
  tracex:
    build: .
    container_name: tracex-platform
    privileged: true
    volumes:
      - ./cases:/cases
      - ./evidence:/evidence
      - ./output:/output
      - /dev:/dev:ro
    environment:
      - HyperTraceX_MODE=enterprise
      - HyperTraceX_LOG_LEVEL=INFO
    network_mode: host
    restart: unless-stopped
    command: python3 tracex.py

  tracex-api:
    build: .
    container_name: tracex-api
    ports:
      - "5000:5000"
    volumes:
      - ./cases:/cases
      - ./evidence:/evidence
      - ./output:/output
    environment:
      - HyperTraceX_API_HOST=0.0.0.0
      - HyperTraceX_API_PORT=5000
    restart: unless-stopped
    command: python3 -c "from enterprise.api_server import APIServer; api = APIServer(host='0.0.0.0', port=5000); api.start()"

  tracex-web:
    build: .
    container_name: tracex-web
    ports:
      - "8888:8888"
    volumes:
      - ./cases:/cases
      - ./output:/output
    environment:
      - HyperTraceX_WEB_HOST=0.0.0.0
      - HyperTraceX_WEB_PORT=8888
    restart: unless-stopped
    command: python3 -c "from gui.web.web_app import WebApp; app = WebApp(host='0.0.0.0', port=8888); app.start()"
